<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Samsung Signage Leak Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: black;
            color: lime;
            overflow: auto;
        }

        h1 {
            position: fixed;
            top: 10px;
            left: 10px;
        }

        #metrics {
            position: fixed;
            top: 60px;
            left: 10px;
            font-size: 14px;
        }

        #dom-container {
            margin-top: 120px;
        }

        .box {
            width: 40px;
            height: 40px;
            background: red;
            margin: 2px;
            display: inline-block;
        }
    </style>
</head>
<body>

<h1>Leak Demo Running...</h1>

<div id="metrics"></div>
<div id="dom-container"></div>

<!-- IMPORTANT: Watchdog FIRST -->
<script src="watchdog.js"></script>

<!-- Leak App -->
<script src="app.js"></script>

<script>
    const watchdog = new SignageWatchdog({
        thresholds: {
            memory: {
                warning: 60,
                critical: 75,
                reload: 85
            },
            minFPS: 25,
            maxDOMNodes: 2000
        },
        enableLogging: true,
        autoReloadOnCritical: true
    });

    watchdog.start();
</script>

</body>
</html>
